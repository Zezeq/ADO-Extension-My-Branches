<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Origin node -->
  <circle cx="5" cy="2" r="1.5" fill="currentColor"/>
  <!-- Trunk -->
  <line x1="5" y1="3.5" x2="5" y2="12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Curved branch fork -->
  <path d="M5 7 C5 10.5 12 10.5 12 12.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Trunk tip -->
  <circle cx="5" cy="14" r="1.5" fill="currentColor"/>
  <!-- Branch tip -->
  <circle cx="12" cy="14" r="1.5" fill="currentColor"/>
</svg>
