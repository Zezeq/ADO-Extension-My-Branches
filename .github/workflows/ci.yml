name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Test, build and package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Calculate version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            MAJOR_MINOR="0.1"
            PATCH=$(git rev-list origin/main --count)
          else
            MAJOR_MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1,2)
            PATCH=$(git rev-list "${LAST_TAG}..origin/main" --count)
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="${MAJOR_MINOR}.${PATCH}.${{ github.run_number }}"
          else
            VERSION="${MAJOR_MINOR}.${PATCH}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Calculated version: $VERSION"

      - name: Set version in manifest
        run: jq ".version = \"$VERSION\"" vss-extension.json > tmp.json && mv tmp.json vss-extension.json

      - name: Build
        run: npm run build

      - name: Package
        run: npx tfx extension create --manifest-globs vss-extension.json --no-prompt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-branches-${{ env.VERSION }}
          path: '*.vsix'
          if-no-files-found: error
